# NOTA: Sin TLS en esta versión. Añadir ssl_certificate cuando se habilite HTTPS.
#
# Se usa el DNS resolver interno de Docker (127.0.0.11) con variables en proxy_pass
# para que nginx resuelva los upstreams de forma lazy (en cada request) en lugar de
# al arrancar. Así nginx no falla si api o web aún no están listos al iniciarse.

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 110m;

    # Redirigir raíz a /wiki/
    location = / {
        return 302 /wiki/;
    }

    # TUS uploads — strip /wiki prefix antes de pasar a la API
    location /wiki/v1/tus/ {
        set $api api:1502;
        rewrite ^/wiki(/v1/tus/.*)$ $1 break;
        proxy_pass http://$api;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — strip /wiki prefix
    location /wiki/v1/ws/ {
        set $api api:1502;
        rewrite ^/wiki(/v1/ws/.*)$ $1 break;
        proxy_pass http://$api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # API — strip /wiki prefix antes de pasar a FastAPI
    location /wiki/v1/ {
        set $api api:1502;
        rewrite ^/wiki(/v1/.*)$ $1 break;
        proxy_pass http://$api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Frontend — pasar /wiki y /wiki/... sin modificar (Next.js tiene basePath=/wiki)
    # Sin trailing slash para capturar también el 308 redirect de Next.js
    location /wiki {
        set $web web:1503;
        proxy_pass http://$web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
