# NOTA: Sin TLS en esta versión. Añadir ssl_certificate cuando se habilite HTTPS.

upstream api_upstream {
    server api:1502;
}

upstream web_upstream {
    server web:1503;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 110m;

    # Redirigir raíz a /wiki/
    location = / {
        return 302 /wiki/;
    }

    # TUS uploads — strip /wiki prefix antes de pasar a la API
    location /wiki/v1/tus/ {
        proxy_pass http://api_upstream/v1/tus/;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — strip /wiki prefix
    location /wiki/v1/ws/ {
        proxy_pass http://api_upstream/v1/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # API — strip /wiki prefix antes de pasar a FastAPI
    location /wiki/v1/ {
        proxy_pass http://api_upstream/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Frontend — pasar /wiki y /wiki/... sin modificar (Next.js tiene basePath=/wiki)
    # Sin trailing slash para capturar también el 308 redirect de Next.js
    location /wiki {
        proxy_pass http://web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
