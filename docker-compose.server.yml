services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wiki_biklabs
      POSTGRES_USER: wiki_user
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets:
      - pg_password
    ports:
      - "1504:5432"
    volumes:
      - ${WIKI_BASE_PATH:-/home/ubuntu/wiki}/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki_user -d wiki_biklabs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ${WIKI_BASE_PATH:-/home/ubuntu/wiki}/config/env/api.env
    volumes:
      - ${WIKI_BASE_PATH:-/home/ubuntu/wiki}/files:${WIKI_BASE_PATH:-/home/ubuntu/wiki}/files
      - ${WIKI_BASE_PATH:-/home/ubuntu/wiki}/logs/app:/app/logs
    ports:
      - "1502:1502"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ${WIKI_BASE_PATH:-/home/ubuntu/wiki}/config/env/mcp.env
    volumes:
      - ${WIKI_BASE_PATH:-/home/ubuntu/wiki}/files:${WIKI_BASE_PATH:-/home/ubuntu/wiki}/files
    ports:
      - "1501:1501"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/wiki}
        NEXT_PUBLIC_MODE: ${NEXT_PUBLIC_MODE:-hosted}
    restart: unless-stopped
    env_file: ${WIKI_BASE_PATH:-/home/ubuntu/wiki}/config/env/web.env
    ports:
      - "1503:1503"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks:
      - internal

networks:
  internal:
    driver: bridge

secrets:
  pg_password:
    file: ${WIKI_BASE_PATH:-/home/ubuntu/wiki}/config/env/pg_password.txt
