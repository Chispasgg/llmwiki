services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wiki_biklabs
      POSTGRES_USER: wiki_user
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets:
      - pg_password
    volumes:
      - /home/ubuntu/wiki/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki_user -d wiki_biklabs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: /home/ubuntu/wiki/config/env/api.env
    volumes:
      - /home/ubuntu/wiki/files:/home/ubuntu/wiki/files
      - /home/ubuntu/wiki/logs/app:/app/logs
    ports:
      - "1502:1502"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: /home/ubuntu/wiki/config/env/mcp.env
    volumes:
      - /home/ubuntu/wiki/files:/home/ubuntu/wiki/files
    ports:
      - "1501:1501"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: /home/ubuntu/wiki/config/env/web.env
    ports:
      - "1503:1503"
    networks:
      - internal

networks:
  internal:
    driver: bridge

secrets:
  pg_password:
    file: /home/ubuntu/wiki/config/env/pg_password.txt
